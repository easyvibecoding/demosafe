<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DemoSafe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid #e5e5e5;
    }
    .header .icon {
      font-size: 20px;
    }
    .header .title {
      font-weight: 600;
      font-size: 14px;
    }
    .status-section {
      padding: 12px;
      border-bottom: 1px solid #e5e5e5;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .status-row:last-child { margin-bottom: 0; }
    .status-label { color: #666; }
    .status-value { font-weight: 500; }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .dot.connected { background: #22c55e; }
    .dot.offline { background: #ef4444; }
    .actions {
      padding: 8px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      background: transparent;
      transition: background 0.15s;
    }
    .btn:hover { background: #f5f5f5; }
    .btn-primary {
      background: #1a1a2e;
      color: white;
      text-align: center;
      font-weight: 500;
    }
    .btn-primary:hover { background: #2a2a4e; }
    .btn-primary.active {
      background: #e94560;
    }
    .btn-primary.active:hover { background: #d63850; }
    .footer {
      padding: 8px 12px;
      border-top: 1px solid #e5e5e5;
      text-align: center;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon" id="headerIcon">🛡️</span>
    <span class="title">DemoSafe</span>
  </div>

  <div class="status-section">
    <div class="status-row">
      <span class="status-label">Connection</span>
      <span class="status-value">
        <span class="dot offline" id="connectionDot"></span>
        <span id="connectionText">Offline</span>
      </span>
    </div>
    <div class="status-row">
      <span class="status-label">Mode</span>
      <span class="status-value" id="modeText">Normal</span>
    </div>
    <div class="status-row">
      <span class="status-label">Context</span>
      <span class="status-value" id="contextText">—</span>
    </div>
    <div class="status-row">
      <span class="status-label">Patterns</span>
      <span class="status-value" id="patternCount">0</span>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="toggleDemo">Toggle Demo Mode</button>
  </div>

  <div class="footer">
    DemoSafe v0.1.0
  </div>

  <script src="../../dist/popup/popup.js" type="module"></script>
</body>
</html>
